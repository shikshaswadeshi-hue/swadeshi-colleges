function getBullets(id){
 return [...document.getElementById(id).querySelectorAll("input")].map(i=>i.value).filter(v=>v);

function getTable(tableId){

 const table = document.getElementById(tableId);
 const rows = table.querySelectorAll("tr");
 const data = [];

 rows.forEach((row,i)=>{

  if(i === 0) return;

  const inputs = row.querySelectorAll("input");

  if(inputs.length === 0) return;

  const rowData = {};

  inputs.forEach((input,index)=>{
   rowData["col"+index] = input.value.trim();
  });

  data.push(rowData);

 });

 return data;
}

function saveCollege(type){

 const nameInput = document.getElementById("name");
 const slugInput = document.getElementById("slug");
 const logoInput = document.getElementById("logo");
 const imageInput = document.getElementById("image");
 const titleInput = document.getElementById("title");
 const establishedInput = document.getElementById("established");
 const approvalInput = document.getElementById("approval");
 const rankingInput = document.getElementById("ranking");
 const campusSizeInput = document.getElementById("campusSize");
 const highestPackageInput = document.getElementById("highestPackage");
 const averagePackageInput = document.getElementById("averagePackage");

 const slugVal = slugInput.value.trim();

 if(!nameInput.value.trim()) return alert("College Name required");
 if(!slugVal) return alert("Slug required");

 const safe = v => v || "";

 const docId = currentCollegeId || slugVal;

 db.collection("colleges").doc(docId).set({

  name: safe(nameInput.value),
  slug: slugVal,
  logo: safe(logoInput.value),
  image: safe(imageInput.value),
  title: safe(titleInput.value),

  established: safe(establishedInput.value),
  approval: safe(approvalInput.value),
  ranking: safe(rankingInput.value),
  campusSize: safe(campusSizeInput.value),
  highestPackage: safe(highestPackageInput.value),
  averagePackage: safe(averagePackageInput.value),

  overview: getBullets("overview"),
  courses: getTable("courses"),
  eligibility: getBullets("eligibility"),
  application: getBullets("application"),
  admission: getBullets("admission"),
  fees: getTable("fees"),
  cutoffs: getTable("cutoffs"),
  placements: getBullets("placements"),
  scholarships: getBullets("scholarships"),
  whyChoose: getBullets("whyChoose"),
  facilities: getBullets("facilities"),
  recruiters: getBullets("recruiters"),
  faq: getTable("faq"),

  status: type,

  publishedAt: firebase.firestore.FieldValue.serverTimestamp()

}).then(()=>{

   if(type === "draft"){
     alert("Draft Saved ✅");
   } else {
     alert("College Published 🚀");
   }

   clearForm();
   currentCollegeId = null;

}).catch(error=>{
   console.error("Save error:", error);
   alert("Error saving college. Check console.");
});

}

function loadItems(type){

  publishedList.innerHTML = `<h3>Loading...</h3>`;

  Promise.all([
    db.collection("colleges")
      .where("status","==",type)
      .orderBy("publishedAt","desc")
      .get(),

    db.collection("contentPages")
      .where("status","==",type)
      .orderBy("publishedAt","desc")
      .get()
  ])
  .then(([collegeSnapshot, contentSnapshot])=>{

    let html = `<h3>${type.toUpperCase()} ITEMS</h3>`;

    if(collegeSnapshot.empty && contentSnapshot.empty){
      publishedList.innerHTML = `<h3>No ${type} items yet</h3>`;
      return;
    }

    if(!collegeSnapshot.empty){
      html += `<h4>Colleges</h4>`;
      collegeSnapshot.forEach(doc=>{
        const d = doc.data();
        html += `
          <div style="padding:10px;border-bottom:1px solid #eee;">
            <b>${d.name || "Untitled College"}</b><br>
            <small>Slug: ${d.slug || ""}</small><br>
            <button onclick="editCollege('${doc.id}')">Edit</button>
            <button onclick="deleteCollege('${doc.id}')">Delete</button>
          </div>
        `;
      });
    }

    if(!contentSnapshot.empty){
      html += `<h4 style="margin-top:20px;">Content Pages</h4>`;
      contentSnapshot.forEach(doc=>{
        const d = doc.data();
        html += `
          <div style="padding:10px;border-bottom:1px solid #eee;">
            <b>${d.title || "Untitled Page"}</b><br>
            <small>Type: ${d.pageType || ""}</small><br>
            <small>Slug: ${d.slug || ""}</small><br>
            <button onclick="editContentPage('${doc.id}')">Edit</button>
            <button onclick="deleteContentPage('${doc.id}')">Delete</button>
          </div>
        `;
      });
    }

    publishedList.innerHTML = html;

  })
  .catch(error=>{
    console.error(error);
    alert("Error loading items");
  });
}

function getContentSectionsData(){
  const sections = [];
  const boxes = contentSections.querySelectorAll(".card");

  boxes.forEach(box => {
    const heading = box.querySelector(".sectionHeading")?.value.trim() || "";

    if(box.querySelector(".sectionText")){
      sections.push({
        type: "text",
        heading: heading,
        text: box.querySelector(".sectionText").value.trim()
      });
    }

    else if(box.querySelector(".sectionList")){
      sections.push({
        type: "list",
        heading: heading,
        items: box.querySelector(".sectionList").value
          .split("\n")
          .map(x => x.trim())
          .filter(x => x)
      });
    }

    else if(box.querySelector(".sectionTable")){
      sections.push({
        type: "table",
        heading: heading,
        rows: box.querySelector(".sectionTable").value
          .split("\n")
          .map(x => x.trim())
          .filter(x => x)
      });
    }

    else if(box.querySelector(".sectionLinks")){
      sections.push({
        type: "links",
        heading: heading,
        links: box.querySelector(".sectionLinks").value
          .split("\n")
          .map(x => x.trim())
          .filter(x => x)
      });
    }
  });

  return sections;
}

function saveContentPage(status){
  const titleVal = pageTitle.value.trim();
  const slugVal = pageSlug.value.trim();

  if(!titleVal) return alert("Page Title required");
  if(!slugVal) return alert("Page Slug required");
  if(!pageType.value) return alert("Please select page type");

  const docId = currentContentPageId || slugVal;

  db.collection("contentPages").doc(docId).set({
    title: titleVal,
    slug: slugVal,
    pageType: pageType.value,
    heroImage: pageHeroImage.value.trim(),
    introText: pageIntroText.value.trim(),
    sections: getContentSectionsData(),
    status: status,
    publishedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    alert(status === "draft" ? "Content Page Draft Saved ✅" : "Content Page Published 🚀");
    clearContentPageForm();
    currentContentPageId = null;
  }).catch(error => {
    console.error(error);
    alert("Error saving content page");
  });
} 


function deleteContentPage(id){
  if(confirm("Delete this content page?")){
    db.collection("contentPages").doc(id).delete()
      .then(()=>{
        alert("Content page deleted");
        loadItems(currentListType);
      })
      .catch(error=>{
        console.error(error);
        alert("Error deleting content page");
      });
  }
}

function editContentPage(id){
  currentContentPageId = id;
  currentEditorType = "content";

  db.collection("contentPages").doc(id).get().then(doc=>{

    const d = doc.data();
    if(!d) return alert("Content page not found");

    showEditor();
    clearContentPageForm();
    collegeEditor.style.display = "none";
    contentPageEditor.style.display = "block";

    pageTitle.value = d.title || "";
    pageSlug.value = d.slug || "";
    pageType.value = d.pageType || "";
    pageHeroImage.value = d.heroImage || "";
    pageIntroText.value = d.introText || "";

    if(d.sections){
      d.sections.forEach(section=>{

        const div = document.createElement("div");
        div.className = "card";

        if(section.type === "text"){
  div.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
      <h4 style="margin:0;">Text Section</h4>
      <button type="button" class="addBtn" onclick="this.closest('.card').remove()">Remove Section</button>
    </div>
    <input class="sectionHeading" placeholder="Section Heading" value="${section.heading || ""}">
    <textarea class="sectionText" placeholder="Section Text" rows="6">${section.text || ""}</textarea>
  `;
}

        if(section.type === "list"){
  div.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
      <h4 style="margin:0;">List Section</h4>
      <button type="button" class="addBtn" onclick="this.closest('.card').remove()">Remove Section</button>
    </div>
    <input class="sectionHeading" placeholder="List Heading" value="${section.heading || ""}">
    <textarea class="sectionList" placeholder="One point per line" rows="8">${(section.items || []).join("\n")}</textarea>
  `;
}

        if(section.type === "table"){
  div.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
      <h4 style="margin:0;">Table Section</h4>
      <button type="button" class="addBtn" onclick="this.closest('.card').remove()">Remove Section</button>
    </div>
    <input class="sectionHeading" placeholder="Table Heading" value="${section.heading || ""}">
    <textarea class="sectionTable" placeholder="Write rows like this:
XAT Percentile | College Type
95-99+ | XLRI, SPJIMR, XIM" rows="8">${(section.rows || []).join("\n")}</textarea>
  `;
}

        if(section.type === "links"){
  div.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
      <h4 style="margin:0;">Related Links Section</h4>
      <button type="button" class="addBtn" onclick="this.closest('.card').remove()">Remove Section</button>
    </div>
    <input class="sectionHeading" placeholder="Links Section Heading" value="${section.heading || ""}">
    <textarea class="sectionLinks" placeholder="Write like this:
IILM Greater Noida | college.html?slug=iilm-greater-noida" rows="8">${(section.links || []).join("\n")}</textarea>
  `;
}

        contentSections.appendChild(div);

      });
    }

    alert("Content page loaded for editing");

  }).catch(error=>{
    console.error(error);
    alert("Error loading content page");
  });
} 

function logout(){
  firebase.auth().signOut()
    .then(()=>{
      alert("Logged out successfully");
    })
    .catch(error=>{
      console.error(error);
      alert(error.message);
    });
}


</script>
