<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Content Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f8f7f2;
  color:#16202f;
}

a{
  text-decoration:none;
  color:#1d63c6;
}

.page{
  max-width:1100px;
  margin:0 auto;
  padding:24px 18px 60px;
  position:relative;
  z-index:1;
}

.topBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  margin-bottom:22px;
  opacity:0;
  transform:translateY(-20px);
  animation:topBarIn .7s ease .1s forwards;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brandLogo{
  width:58px;
  height:58px;
  border-radius:16px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(22,32,47,0.08);
  padding:6px;
  animation:logoFloat 3.5s ease-in-out infinite;
}

.brandLogo img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.brandText strong{
  display:block;
  font-size:20px;
}

.brandText span{
  display:block;
  font-size:13px;
  color:#667085;
  margin-top:3px;
}

.homeBtn{
  background:linear-gradient(135deg,#ff6a00 0%,#ff8f1f 100%);
  color:white;
  border:none;
  border-radius:999px;
  padding:12px 18px;
  font-weight:700;
  cursor:pointer;
  transition:transform 0.25s ease, box-shadow 0.25s ease;
}

.homeBtn:hover{
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 12px 24px rgba(255,106,0,0.22);
}

/* ===== PREMIUM ANIMATIONS ===== */

.hero{
  position:relative;
  background:linear-gradient(135deg,#fff8ef 0%,#fff3e6 38%,#eef8ea 100%);
  border:1px solid #f1e4d3;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 20px 45px rgba(22,32,47,0.08);
  margin-bottom:26px;
  opacity:0;
  transform:translateY(60px) scale(0.96);
  animation:heroEntry 1s cubic-bezier(.22,1,.36,1) forwards;
}

.hero::before{
  content:"";
  position:absolute;
  width:260px;
  height:260px;
  background:radial-gradient(circle, rgba(255,140,31,0.24) 0%, rgba(255,140,31,0) 70%);
  top:-80px;
  right:-40px;
  border-radius:50%;
  animation:floatGlow 6s ease-in-out infinite;
  pointer-events:none;
}

.hero::after{
  content:"";
  position:absolute;
  width:220px;
  height:220px;
  background:radial-gradient(circle, rgba(29,99,198,0.16) 0%, rgba(29,99,198,0) 72%);
  bottom:-80px;
  left:-40px;
  border-radius:50%;
  animation:floatGlow 7s ease-in-out infinite reverse;
  pointer-events:none;
}

.heroContent{
  position:relative;
  z-index:2;
  padding:28px;
}

.heroImageWrap{
  width:100%;
  height:320px;
  background:linear-gradient(135deg,#e3ecff 0%,#f8fbff 100%);
  display:none;
  overflow:hidden;
  position:relative;
}

.heroImageWrap::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, rgba(255,255,255,0) 20%, rgba(255,255,255,0.35) 50%, rgba(255,255,255,0) 80%);
  transform:translateX(-120%);
  animation:shineSweep 2.4s ease 0.8s 1 forwards;
}

.heroImageWrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transform:scale(1.14);
  opacity:0;
  animation:imageReveal 1.3s ease forwards;
}

.heroBadge{
  display:inline-block;
  padding:9px 14px;
  border-radius:999px;
  background:#fff;
  border:1px solid #eadfce;
  color:#168b10;
  font-size:13px;
  font-weight:700;
  margin-bottom:14px;
  opacity:0;
  transform:translateY(25px);
  animation:fadeUpPop .7s ease .25s forwards;
  box-shadow:0 10px 18px rgba(0,0,0,0.04);
}

.heroContent h1{
  margin:0 0 14px;
  font-size:42px;
  line-height:1.1;
  color:#16202f;
  opacity:0;
  transform:translateY(35px);
  animation:fadeUpPop .85s ease .4s forwards;
}

.heroIntro{
  font-size:17px;
  line-height:1.8;
  color:#4f5b67;
  opacity:0;
  transform:translateY(35px);
  animation:fadeUpPop .9s ease .58s forwards;
}

.section{
  background:#fff;
  border:1px solid #ece3d8;
  border-radius:24px;
  padding:24px;
  margin-bottom:22px;
  box-shadow:0 12px 28px rgba(16,24,40,0.05);
  opacity:0;
  transform:perspective(1000px) rotateX(10deg) translateY(60px);
  transition:
    opacity .9s cubic-bezier(.22,1,.36,1),
    transform .9s cubic-bezier(.22,1,.36,1),
    box-shadow .25s ease;
  transform-origin:top center;
}

.section.show{
  opacity:1;
  transform:perspective(1000px) rotateX(0deg) translateY(0);
}

.section:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 40px rgba(16,24,40,0.10);
}

.section h2{
  margin:0 0 12px;
  font-size:28px;
  color:#16202f;
  position:relative;
  padding-bottom:10px;
}

.section h2::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:0;
  height:3px;
  border-radius:20px;
  background:linear-gradient(90deg,#ff6a00,#1d63c6);
  transition:width .7s ease;
}

.section.show h2::after{
  width:72px;
}

.relatedLink{
  display:block;
  padding:14px 16px;
  border-radius:14px;
  background:#fffaf4;
  border:1px solid #efe4d8;
  font-weight:600;
  transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
}

.relatedLink:hover{
  transform:translateX(8px);
  box-shadow:0 12px 24px rgba(16,24,40,0.08);
  background:#fff2e3;
}

.ctaBox{
  background:linear-gradient(135deg,#16202f 0%,#1d63c6 100%);
  color:white;
  border-radius:24px;
  padding:28px 22px;
  text-align:center;
  box-shadow:0 18px 38px rgba(16,24,40,0.18);
  opacity:0;
  transform:scale(0.94) translateY(50px);
  transition:opacity .9s ease, transform .9s cubic-bezier(.22,1,.36,1);
  position:relative;
  overflow:hidden;
}

.ctaBox::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:120%;
  height:100%;
  background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.16) 50%, rgba(255,255,255,0) 100%);
  transition:left 1s ease;
}

.ctaBox.show{
  opacity:1;
  transform:scale(1) translateY(0);
}

.ctaBox.show::before{
  left:120%;
}

.ctaBtn,
.homeBtn{
  position:relative;
  overflow:hidden;
  transition:transform .22s ease, box-shadow .22s ease;
}

.ctaBtn::after,
.homeBtn::after{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:120%;
  height:100%;
  background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.35) 50%, rgba(255,255,255,0) 100%);
  transition:left .7s ease;
}

.ctaBtn:hover,
.homeBtn:hover{
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 14px 26px rgba(0,0,0,0.14);
}

.ctaBtn:hover::after,
.homeBtn:hover::after{
  left:120%;
}

@keyframes heroEntry{
  from{
    opacity:0;
    transform:translateY(60px) scale(0.96);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

@keyframes fadeUpPop{
  0%{
    opacity:0;
    transform:translateY(35px);
  }
  70%{
    opacity:1;
    transform:translateY(-4px);
  }
  100%{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes imageReveal{
  from{
    opacity:0;
    transform:scale(1.14);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}

@keyframes floatGlow{
  0%{
    transform:translateY(0) translateX(0) scale(1);
  }
  50%{
    transform:translateY(18px) translateX(-12px) scale(1.08);
  }
  100%{
    transform:translateY(0) translateX(0) scale(1);
  }
}

@keyframes logoFloat{
  0%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-5px);
  }
  100%{
    transform:translateY(0);
  }
}

@keyframes shineSweep{
  from{
    transform:translateX(-120%);
  }
  to{
    transform:translateX(140%);
  }
}

@keyframes topBarIn{
  from{
    opacity:0;
    transform:translateY(-20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@media (max-width:768px){
  .heroImageWrap{
    height:220px;
  }

  .heroContent h1{
    font-size:30px;
  }

  .section{
    padding:20px;
  }

  .section h2{
    font-size:24px;
  }
}

  /* ===== RESTORE BASE UI STYLING ===== */

.section p{
  margin:0;
  line-height:1.8;
  color:#4f5b67;
  white-space:pre-line;
}

ul{
  margin:0;
  padding-left:20px;
}

li{
  margin-bottom:10px;
  line-height:1.75;
  color:#344054;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
  border-radius:12px;
  overflow:hidden;
}

th, td{
  border:1px solid #ece3d8;
  padding:12px;
  text-align:left;
  vertical-align:top;
}

th{
  background:linear-gradient(135deg,#fff6ec,#fffaf4);
  color:#16202f;
  font-weight:700;
}

td{
  background:#fff;
}

/* Better table hover */
tr:hover td{
  background:#fff8f2;
}

/* CTA button styling (important!) */
.ctaBtn{
  border:none;
  background:linear-gradient(135deg,#ff6a00 0%,#ff8f1f 100%);
  color:white;
  border-radius:999px;
  padding:13px 20px;
  font-weight:700;
  cursor:pointer;
  display:inline-block;
}

/* Empty state styling */
.emptyState{
  background:#fff;
  border:1px solid #ece3d8;
  border-radius:24px;
  padding:40px 24px;
  text-align:center;
  box-shadow:0 12px 28px rgba(16,24,40,0.05);
}

.emptyState h2{
  margin-bottom:8px;
}

.emptyState p{
  color:#667085;
}

.floatingBg{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.floatingBg::before,
.floatingBg::after{
  content:"";
  position:absolute;
  border-radius:50%;
  filter:blur(70px);
  opacity:0.22;
}

.floatingBg::before{
  width:260px;
  height:260px;
  background:#ffb36b;
  top:8%;
  left:3%;
  animation:blobMove1 11s ease-in-out infinite;
}

.floatingBg::after{
  width:300px;
  height:300px;
  background:#8fc0ff;
  bottom:5%;
  right:2%;
  animation:blobMove2 13s ease-in-out infinite;
}

@keyframes blobMove1{
  0%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(35px,30px) scale(1.12); }
  100%{ transform:translate(0,0) scale(1); }
}

@keyframes blobMove2{
  0%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(-40px,-25px) scale(1.08); }
  100%{ transform:translate(0,0) scale(1); }
}

.relatedLinks{
  display:flex;
  flex-direction:column;
  gap:10px;
}  
</style>
</head>

<body>
<div class="floatingBg"></div>  

<div class="page">

  <div class="topBar">
    <div class="brand">
      <div class="brandLogo">
        <img src="swadeshi-logo.png" alt="Swadeshi Shiksha Logo">
      </div>
      <div class="brandText">
        <strong>Swadeshi Shiksha</strong>
        <span>Aaj Select Karo, Kal Shine Karo</span>
      </div>
    </div>

    <button class="homeBtn" onclick="window.location.href='https://www.swadeshi-shiksha.com'">
      Back to Home
    </button>
  </div>

  <div id="pageContent">
    <div class="emptyState">Loading page...</div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyCQNocdvSpqjm7ZMcrVYW0Fc-iMycGQO94",
  authDomain:"swadeshi-shiksha.firebaseapp.com",
  projectId:"swadeshi-shiksha"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();
const pageContent = document.getElementById("pageContent");

const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

if(!slug){
  pageContent.innerHTML = `
    <div class="emptyState">
      <h2>Page not found</h2>
      <p>Missing page slug.</p>
    </div>
  `;
} else {
  db.collection("contentPages").doc(slug).get().then(doc => {
    if(!doc.exists){
      pageContent.innerHTML = `
        <div class="emptyState">
          <h2>Page not found</h2>
          <p>No content page found for this slug.</p>
        </div>
      `;
      return;
    }

    const d = doc.data();
    renderContentPage(d);
  }).catch(error => {
    console.error(error);
    pageContent.innerHTML = `
      <div class="emptyState">
        <h2>Error loading page</h2>
        <p>Please refresh and try again.</p>
      </div>
    `;
  });
}

function parseTableRows(rows){
  return (rows || []).map(row => row.split("|").map(x => x.trim()));
}

function parseLinks(lines){
  return (lines || []).map(line => {
    const parts = line.split("|");
    return {
      label: (parts[0] || "").trim(),
      url: (parts[1] || "").trim()
    };
  }).filter(link => link.label && link.url);
}

function renderContentPage(data){
  let html = `
    <div class="hero">
      <div class="heroImageWrap" id="heroImageWrap" style="${data.heroImage ? 'display:block;' : 'display:none;'}">
        <img src="${data.heroImage || ''}" alt="${data.title || ''}">
      </div>

      <div class="heroContent">
        <div class="heroBadge">${data.pageType || "Guide"}</div>
        <h1>${data.title || ""}</h1>
        <div class="heroIntro">${data.introText || ""}</div>
      </div>
    </div>
  `;

  if(data.sections && data.sections.length){
    data.sections.forEach(section => {

      if(section.type === "text"){
        html += `
          <div class="section">
            <h2>${section.heading || ""}</h2>
            <p>${section.text || ""}</p>
          </div>
        `;
      }

      if(section.type === "list"){
        const items = (section.items || []).map(item => `<li>${item}</li>`).join("");
        html += `
          <div class="section">
            <h2>${section.heading || ""}</h2>
            <ul>${items}</ul>
          </div>
        `;
      }

      if(section.type === "table"){
        const parsedRows = parseTableRows(section.rows || []);
        let tableHtml = "";

        if(parsedRows.length){
          const firstRow = parsedRows[0];
          const remainingRows = parsedRows.slice(1);

          tableHtml += "<table>";
          tableHtml += "<tr>" + firstRow.map(col => `<th>${col}</th>`).join("") + "</tr>";

          remainingRows.forEach(row => {
            tableHtml += "<tr>" + row.map(col => `<td>${col}</td>`).join("") + "</tr>";
          });

          tableHtml += "</table>";
        }

        html += `
          <div class="section">
            <h2>${section.heading || ""}</h2>
            ${tableHtml}
          </div>
        `;
      }

      if(section.type === "links"){
        const links = parseLinks(section.links || []);
        const linksHtml = links.map(link => `
          <a class="relatedLink" href="${link.url}" target="_blank" rel="noopener noreferrer">
            ${link.label}
          </a>
        `).join("");

        html += `
          <div class="section">
            <h2>${section.heading || ""}</h2>
            <div class="relatedLinks">${linksHtml}</div>
          </div>
        `;
      }

    });
  }

  html += `
    <div class="ctaBox">
      <h3>Need help with admissions?</h3>
      <p>
        Get free counselling support from Swadeshi Shiksha for college shortlisting,
        admission guidance, and profile clarity.
      </p>
      <button class="ctaBtn" onclick="window.location.href='https://www.swadeshi-shiksha.com'">
        Get Free Counselling
      </button>
    </div>
  `;

  pageContent.innerHTML = html;
  initRevealAnimations();
}

function initRevealAnimations(){
  const items = document.querySelectorAll(".section, .ctaBox");

  if(!items.length) return;

  items.forEach((item, index) => {
    item.style.transitionDelay = (index * 0.14) + "s";
  });

  const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.classList.add("show");
        obs.unobserve(entry.target);
      }
    });
  }, {
    threshold: 0.18
  });

  items.forEach(item => observer.observe(item));
}
</script>


</body>
</html>
