<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swadeshi Shiksha</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#faf8f2;color:#16202f}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 50px;
  background:#fff;
  box-shadow:0 6px 25px rgba(0,0,0,0.06);
  position:sticky;
  top:0;
  z-index:999;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:700;
}

.logo img{
  height:48px;
}

.nav{
  display:flex;
  gap:28px;
  font-size:15px;
  color:#444;
}

.cta{
  background:#4d2fb2;
  color:#fff;
  padding:10px 20px;
  border-radius:25px;
  font-size:14px;
}

/* HERO */
.hero{
  padding:100px 20px 70px;
  text-align:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  top:-120px;
  left:50%;
  transform:translateX(-50%);
  width:700px;
  height:700px;
  background:radial-gradient(circle, rgba(77,47,178,0.15), transparent 70%);
  z-index:-1;
}

.hero h1{
  font-size:48px;
  font-weight:800;
  line-height:1.2;
  max-width:850px;
  margin:auto;
}

.hero p{
  margin-top:18px;
  font-size:17px;
  color:#555;
}

/* SEARCH */
.search{
  margin-top:35px;
  display:flex;
  justify-content:center;
}

.search-box{
  display:flex;
  align-items:center;
  gap:10px;
  background:#fff;
  padding:14px 18px;
  border-radius:50px;
  width:720px;
  max-width:92%;
  box-shadow:0 18px 40px rgba(0,0,0,0.08);
}

.search-box input{
  flex:1;
  border:none;
  outline:none;
  font-size:16px;
}

.search-box button{
  background:#4d2fb2;
  color:#fff;
  border:none;
  border-radius:30px;
  padding:12px 22px;
  cursor:pointer;
}

/* TRUST */
.trust{
  margin-top:45px;
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  font-size:14px;
  color:#444;
}

.trust div{
  background:#fff;
  padding:10px 18px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="https://www.swadeshi-shiksha.com/_next/image?url=%2Flogo.png&w=256&q=75">
    <span>Swadeshi Shiksha</span>
  </div>

  <div class="nav">
    <a href="#">Colleges</a>
    <a href="#">Exams</a>
    <a href="#">Courses</a>
    <a href="#">About</a>
  </div>

  <div class="cta">Free Counselling</div>
</div>

<div class="hero">
  <h1>Find the Right MBA College Without the Confusion</h1>
  <p>Search, compare and get expert counselling for top MBA colleges in India</p>

  <div class="search">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="collegeSearch" placeholder="Search your college here...">
      <button id="searchBtn">Search</button>
    </div>
  </div>

  <div class="trust">
    <div>✔ 500+ Colleges</div>
    <div>✔ Free Counselling</div>
    <div>✔ Trusted by Students</div>
  </div>
</div>

<script>
const input = document.getElementById("collegeSearch");
const btn = document.getElementById("searchBtn");

function goToSearchPage(){
  const query = input.value.trim();
  if(!query) return;

  window.open(
    "https://swadeshi-colleges.vercel.app/colleges.html?search=" + encodeURIComponent(query),
    "_blank"
  );
}

btn.addEventListener("click", goToSearchPage);
input.addEventListener("keydown", e=>{
  if(e.key === "Enter") goToSearchPage();
});
</script>

</body>
</html>
