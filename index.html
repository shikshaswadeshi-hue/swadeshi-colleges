<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swadeshi Shiksha | Search, Compare & Decide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#faf8f2;color:#16202f}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  background:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,0.05);
  position:sticky;
  top:0;
  z-index:999;
}

.logo{display:flex;align-items:center;gap:10px;font-weight:600}
.logo img{height:42px}

.nav{display:flex;gap:28px;font-size:15px;color:#444}
.nav a{color:#444}

.cta-btn{
  background:#4d2fb2;
  color:#fff;
  padding:10px 18px;
  border-radius:25px;
  border:none;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px 40px;
}

.hero h1{
  font-size:40px;
  font-weight:700;
  margin-bottom:16px;
}

.hero p{
  font-size:17px;
  color:#555;
  margin-bottom:30px;
}

/* SEARCH BAR (your code styled) */
.search-wrapper{
  max-width:760px;
  margin:30px auto;
}

.search-box{
  display:flex;
  align-items:center;
  gap:12px;
  background:#fff;
  border:1px solid #e5e5e5;
  border-radius:50px;
  padding:12px 16px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

.search-box input{
  flex:1;
  border:none;
  outline:none;
  font-size:16px;
}

.search-box button{
  background:#4d2fb2;
  color:#fff;
  border:none;
  border-radius:30px;
  padding:10px 20px;
  cursor:pointer;
}

/* STATS */
.stats{
  display:flex;
  justify-content:center;
  gap:50px;
  margin-top:50px;
  flex-wrap:wrap;
}

.stat{text-align:center}
.stat h2{font-size:26px;color:#4d2fb2}
.stat p{color:#666;font-size:14px}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="swadeshi-logo.png">
    <span>Swadeshi Shiksha</span>
  </div>

  <div class="nav">
    <a href="#">Colleges</a>
    <a href="#">Exams</a>
    <a href="#">Courses</a>
    <a href="#">About</a>
  </div>

  <button class="cta-btn">Free Counselling</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Find the Right MBA College for You</h1>
  <p>Search, compare and apply to top MBA/PGDM colleges in India</p>

  <!-- SEARCH -->
  <div class="search-wrapper">
    <div class="search-box">
      <span style="font-size:20px;color:#777">🔍</span>
      <input type="text" id="collegeSearch" placeholder="Search your college here...">
      <button id="searchBtn">Search</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <h2>500+</h2>
      <p>Colleges</p>
    </div>
    <div class="stat">
      <h2>50K+</h2>
      <p>Students Guided</p>
    </div>
    <div class="stat">
      <h2>100%</h2>
      <p>Free Counselling</p>
    </div>
  </div>
</div>

<script>
const input = document.getElementById("collegeSearch");
const btn = document.getElementById("searchBtn");

function goToSearchPage(){
  const query = input.value.trim();
  if(!query) return;

  window.open(
    "https://swadeshi-colleges.vercel.app/colleges.html?search=" + encodeURIComponent(query),
    "_blank"
  );
}

btn.addEventListener("click", goToSearchPage);
input.addEventListener("keydown", e=>{
  if(e.key === "Enter") goToSearchPage();
});
</script>

</body>
</html>
