<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swadeshi Shiksha</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#faf8f2;color:#16202f}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 60px;
  background:#fff;
  box-shadow:0 6px 30px rgba(0,0,0,0.06);
  position:sticky;
  top:0;
  z-index:999;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
}
.logo img{height:46px}
.logo span{font-size:16px}

.nav{
  display:flex;
  gap:30px;
  font-size:14px;
  color:#333;
}

.nav a{position:relative}

.nav a:hover{
  color:#4d2fb2;
}

.cta{
  background:#4d2fb2;
  color:#fff;
  padding:10px 20px;
  border-radius:25px;
  font-weight:600;
}

/* HERO */
.hero{
  padding:100px 20px 80px;
  text-align:center;
  position:relative;
}

/* premium gradient layer */
.hero::before{
  content:"";
  position:absolute;
  top:-200px;
  left:50%;
  transform:translateX(-50%);
  width:900px;
  height:900px;
  background:radial-gradient(circle,#4d2fb2 0%,transparent 70%);
  opacity:0.12;
  z-index:-1;
}

.hero h1{
  font-size:52px;
  font-weight:800;
  line-height:1.2;
  max-width:900px;
  margin:auto;
}

.hero h1 span{color:#4d2fb2}

.hero p{
  margin-top:18px;
  font-size:17px;
  color:#555;
}

/* SEARCH */
.search{
  margin-top:40px;
}

.search-box{
  display:flex;
  align-items:center;
  gap:12px;
  background:#fff;
  padding:16px 18px;
  border-radius:50px;
  max-width:760px;
  margin:auto;
  box-shadow:0 25px 60px rgba(0,0,0,0.12);
}

.search-box input{
  flex:1;
  border:none;
  outline:none;
  font-size:16px;
}

.search-box button{
  background:#4d2fb2;
  color:#fff;
  border:none;
  border-radius:30px;
  padding:12px 24px;
  cursor:pointer;
}

/* FLOATING COLLEGE CARDS */
.card{
  position:absolute;
  background:#fff;
  padding:10px 14px;
  border-radius:12px;
  box-shadow:0 15px 40px rgba(0,0,0,0.12);
  font-size:13px;
}

.card img{height:30px}

.card1{top:120px;left:8%}
.card2{top:200px;right:10%}
.card3{bottom:100px;left:15%}

/* TRUST */
.trust{
  margin-top:50px;
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.trust div{
  background:#fff;
  padding:12px 18px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="https://www.swadeshi-shiksha.com/_next/image?url=%2Flogo.png&w=256&q=75">
    <span>Swadeshi Shiksha</span>
  </div>

  <div class="nav">
    <a href="#">Colleges</a>
    <a href="#">Exams</a>
    <a href="#">Courses</a>
    <a href="#">Resources</a>
  </div>

  <div class="cta">Free Counselling</div>
</div>

<!-- HERO -->
<div class="hero">

  <!-- floating cards with logos -->
  <div class="card card1"><img src="https://upload.wikimedia.org/wikipedia/en/4/44/IIM_Ahmedabad_Logo.svg"></div>
  <div class="card card2"><img src="https://upload.wikimedia.org/wikipedia/en/5/5a/XLRI_logo.png"></div>
  <div class="card card3"><img src="https://upload.wikimedia.org/wikipedia/en/3/3e/SPJIMR_logo.png"></div>

  <h1>Find Your Perfect <span>MBA College</span></h1>
  <p>Compare colleges, explore options and get expert counselling</p>

  <div class="search">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="collegeSearch" placeholder="Search your college here...">
      <button id="searchBtn">Search</button>
    </div>
  </div>

  <div class="trust">
    <div>✔ 500+ Colleges</div>
    <div>✔ Free Counselling</div>
    <div>✔ Trusted by Students</div>
  </div>

</div>

<script>
const input = document.getElementById("collegeSearch");
const btn = document.getElementById("searchBtn");

function goToSearchPage(){
  const query = input.value.trim();
  if(!query) return;

  window.open(
    "https://swadeshi-colleges.vercel.app/colleges.html?search=" + encodeURIComponent(query),
    "_blank"
  );
}

btn.addEventListener("click", goToSearchPage);
input.addEventListener("keydown", e=>{
  if(e.key === "Enter") goToSearchPage();
});
</script>

</body>
</html>
