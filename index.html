<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swadeshi Shiksha</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f6f4ff;color:#121212}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
}

.logo{font-weight:700;font-size:18px}

.cta{
  background:#5b3df5;
  color:#fff;
  padding:10px 20px;
  border-radius:30px;
}

/* HERO */
.hero{
  padding:120px 20px 80px;
  text-align:center;
  position:relative;
}

/* Background glow */
.hero::before{
  content:"";
  position:absolute;
  top:-100px;
  left:50%;
  transform:translateX(-50%);
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(91,61,245,0.2), transparent 70%);
  z-index:-1;
}

.hero h1{
  font-size:52px;
  font-weight:800;
  line-height:1.2;
  max-width:900px;
  margin:auto;
}

.hero p{
  margin-top:20px;
  font-size:18px;
  color:#555;
}

/* SEARCH */
.search{
  margin-top:40px;
  display:flex;
  justify-content:center;
}

.search-box{
  display:flex;
  align-items:center;
  gap:10px;
  background:#fff;
  padding:14px 16px;
  border-radius:50px;
  width:700px;
  max-width:90%;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.search-box input{
  flex:1;
  border:none;
  outline:none;
  font-size:16px;
}

.search-box button{
  background:#5b3df5;
  color:#fff;
  border:none;
  border-radius:30px;
  padding:12px 20px;
  cursor:pointer;
}

/* TRUST */
.trust{
  margin-top:50px;
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
  font-size:14px;
  color:#444;
}

.trust div{
  background:#fff;
  padding:10px 16px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">Swadeshi Shiksha</div>
  <div class="cta">Free Counselling</div>
</div>

<div class="hero">
  <h1>Find the Right MBA College Without the Confusion</h1>
  <p>Search, compare and get expert counselling for top MBA colleges in India</p>

  <div class="search">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="collegeSearch" placeholder="Search your college here...">
      <button id="searchBtn">Search</button>
    </div>
  </div>

  <div class="trust">
    <div>✔ 500+ Colleges</div>
    <div>✔ Free Counselling</div>
    <div>✔ Trusted by Students</div>
  </div>
</div>

<script>
const input = document.getElementById("collegeSearch");
const btn = document.getElementById("searchBtn");

function goToSearchPage(){
  const query = input.value.trim();
  if(!query) return;

  window.open(
    "https://swadeshi-colleges.vercel.app/colleges.html?search=" + encodeURIComponent(query),
    "_blank"
  );
}

btn.addEventListener("click", goToSearchPage);
input.addEventListener("keydown", e=>{
  if(e.key === "Enter") goToSearchPage();
});
</script>

</body>
</html>
