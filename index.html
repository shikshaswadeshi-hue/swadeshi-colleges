<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swadeshi Shiksha</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#faf8f2;color:#16202f}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 60px;
  background:#fff;
  box-shadow:0 6px 30px rgba(0,0,0,0.06);
  position:sticky;
  top:0;
  z-index:999;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo img{
  height:50px;
}

.logo span{
  font-weight:700;
  font-size:16px;
}

.nav{
  display:flex;
  gap:30px;
  font-size:14px;
}

.nav a{
  text-decoration:none;
  color:#333;
  font-weight:500;
}

.nav a:hover{
  color:#4d2fb2;
}

.cta{
  background:#ff6b00;
  color:#fff;
  padding:10px 22px;
  border-radius:25px;
  font-weight:600;
}

/* HERO */
.hero{
  position:relative;
  padding:110px 20px 90px;
  text-align:center;
  overflow:hidden;
}

/* Background image + overlay */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('https://images.unsplash.com/photo-1523240795612-9a054b0db644') center/cover;
  opacity:0.08;
  z-index:-2;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top, rgba(77,47,178,0.15), transparent 70%);
  z-index:-1;
}

.hero h1{
  font-size:54px;
  font-weight:800;
  line-height:1.15;
  max-width:900px;
  margin:auto;
}

.hero h1 span{
  color:#ff6b00;
}

.hero p{
  margin-top:18px;
  font-size:18px;
  color:#555;
}

/* SEARCH */
.search{
  margin-top:45px;
}

.search-box{
  display:flex;
  align-items:center;
  gap:12px;
  background:#fff;
  padding:16px 18px;
  border-radius:60px;
  max-width:760px;
  margin:auto;
  box-shadow:0 25px 60px rgba(0,0,0,0.15);
}

.search-box input{
  flex:1;
  border:none;
  outline:none;
  font-size:17px;
}

.search-box button{
  background:#ff6b00;
  color:#fff;
  border:none;
  border-radius:40px;
  padding:14px 26px;
  font-weight:600;
  cursor:pointer;
}

/* TRUST */
.trust{
  margin-top:55px;
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.trust div{
  background:#fff;
  padding:12px 20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  font-size:14px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="swadeshi-logo.png">
    <span>Swadeshi Shiksha</span>
  </div>

  <div class="nav">
    <a href="#">Colleges</a>
    <a href="#">Exams</a>
    <a href="#">Courses</a>
    <a href="#">Resources</a>
  </div>

  <div class="cta">Free Counselling</div>
</div>

<!-- HERO -->
<div class="hero">

  <h1>Choose Right Today, <span>Shine Tomorrow</span></h1>
  <p>Search, compare and get expert guidance for MBA colleges across India</p>

  <div class="search">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="collegeSearch" placeholder="Search your college here...">
      <button id="searchBtn">Search</button>
    </div>
  </div>

  <div class="trust">
    <div>✔ 500+ Colleges</div>
    <div>✔ Free Counselling</div>
    <div>✔ Trusted by Students</div>
  </div>

</div>

<script>
const input = document.getElementById("collegeSearch");
const btn = document.getElementById("searchBtn");

function goToSearchPage(){
  const query = input.value.trim();
  if(!query) return;

  window.open(
    "https://swadeshi-colleges.vercel.app/colleges.html?search=" + encodeURIComponent(query),
    "_blank"
  );
}

btn.addEventListener("click", goToSearchPage);
input.addEventListener("keydown", e=>{
  if(e.key === "Enter") goToSearchPage();
});
</script>

</body>
</html>
