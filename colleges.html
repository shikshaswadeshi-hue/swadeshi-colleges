<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>All Colleges</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<h1>All Colleges</h1>

<div id="collegeList"></div>

<script>

const firebaseConfig={
 apiKey:"AIzaSyCQNocdvSpqjm7ZMcrVYW0Fc-iMycGQO94",
 authDomain:"swadeshi-shiksha.firebaseapp.com",
 projectId:"swadeshi-shiksha"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const list=document.getElementById("collegeList");

db.collection("colleges")
.where("status","==","published")
.get()
.then(snapshot=>{

 snapshot.forEach(doc=>{

  const d=doc.data();

  const div=document.createElement("div");

  div.innerHTML=`
    <h3>${d.name}</h3>
    <a href="college.html?slug=${doc.id}">View College</a>
    <hr>
  `;

  list.appendChild(div);

 });

});

</script>

</body>
</html>
